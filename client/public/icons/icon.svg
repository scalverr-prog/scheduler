<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Calendar icon -->
  <rect x="96" y="128" width="320" height="288" rx="24" fill="white"/>
  <rect x="96" y="128" width="320" height="64" rx="24" fill="#1e40af"/>
  <rect x="96" y="168" width="320" height="24" fill="#1e40af"/>
  <!-- Calendar dots/lines -->
  <circle cx="176" cy="112" r="16" fill="white"/>
  <circle cx="336" cy="112" r="16" fill="white"/>
  <rect x="160" y="80" width="8" height="64" rx="4" fill="#64748b"/>
  <rect x="328" y="80" width="8" height="64" rx="4" fill="#64748b"/>
  <!-- Grid lines -->
  <line x1="136" y1="256" x2="376" y2="256" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="136" y1="320" x2="376" y2="320" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="200" y1="224" x2="200" y2="384" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="280" y1="224" x2="280" y2="384" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Activity indicators -->
  <rect x="144" y="232" width="48" height="16" rx="4" fill="#22c55e"/>
  <rect x="224" y="264" width="48" height="16" rx="4" fill="#f97316"/>
  <rect x="296" y="328" width="48" height="16" rx="4" fill="#8b5cf6"/>
  <!-- Plus sign -->
  <circle cx="400" cy="400" r="64" fill="#22c55e"/>
  <rect x="384" y="368" width="32" height="64" rx="4" fill="white"/>
  <rect x="368" y="384" width="64" height="32" rx="4" fill="white"/>
</svg>
